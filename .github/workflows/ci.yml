name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install pinned .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Verify release metadata and assets
        run: python scripts/verify-release-metadata.py

      - name: Test release build
        run: dotnet test --configuration Release --no-restore

      - name: Verify self-contained publish
        run: dotnet publish src/Dialkin.App --configuration Release --runtime win-x64 --self-contained true --output artifacts/publish
